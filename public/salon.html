<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Salon</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">

  <h2>Salon</h2>

  <p id="me"></p>

  <div class="player-list" id="players"></div>

</div>

<script>
const user = JSON.parse(sessionStorage.getItem("user"));

if (!user) {
  alert("login first");
  window.location.href = "/";
}

document.getElementById("me").innerText =
  "Current User: " + user.username;

const socket = new WebSocket("ws://localhost:3000");

socket.onopen = () => {
  console.log("WebSocket connected");

  socket.send(JSON.stringify({
    type: "login",
    data: {
      userId: user.id,
      username: user.username
    }
  }));
};

socket.onmessage = (event) => {
  const msg = JSON.parse(event.data);
  console.log("Message reçu :", msg);

  if (msg.type === "players") {
    renderPlayers(msg.data);
  }

  if (msg.type === "challenge") {
    const from = msg.data.from;

    if (confirm(from.username + " challenges you! Accept?")) {
      socket.send(JSON.stringify({
        type: "acceptChallenge",
        data: {
          from: from.id,
          to: user.id
        }
      }));
    }
  }

  if (msg.type === "startGame") {
    console.log("Message startGame reçu, redirection vers la partie");
    window.location.href = "/partie.html";
  }
};

function renderPlayers(players) {
  const list = document.getElementById("players");
  list.innerHTML = "";

  players.forEach(p => {
    if (p.id === user.id) return;

    const div = document.createElement("div");
    div.className = "player";

    const name = document.createElement("span");
    name.innerText = p.username + "  (Victoires : " + (p.score || 0) + ")";

    const btn = document.createElement("button");
    btn.innerText = "challenge";
    btn.className = "small-btn";

    btn.onclick = () => {
      socket.send(JSON.stringify({
        type: "challenge",
        data: {
          from: user.id,
          to: p.id
        }
      }));
    };

    div.appendChild(name);
    div.appendChild(btn);
    list.appendChild(div);
  });
}

</script>

</body>
</html>
