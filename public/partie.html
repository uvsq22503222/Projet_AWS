<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Partie</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body style="flex-direction: column; height:auto; padding-top:40px;">

  <h2>Jeu de dames</h2>

  <div class="container" style="width:400px;">
    <h3 id="playerInfo"></h3>
    <h3 id="turn"></h3>
    <h3 id="errorBox" style="color:red; height:20px;"></h3>
    <button onclick="abandonGame()" style="background:#c0392b; color:white; margin-top:8px;">Abandonner</button>
  </div>

  <div id="board" style="margin-top:30px;"></div>

  <div id="gameOver" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%;
       background:rgba(0,0,0,0.6); z-index:100; flex-direction:column;
       align-items:center; justify-content:center;">
    <div style="background:white; padding:40px; border-radius:12px; text-align:center;">
      <h2 id="gameOverMsg" style="margin-bottom:20px;"></h2>
      <button onclick="window.location.href='/salon.html'"
              style="padding:10px 24px; font-size:16px; cursor:pointer;">
        Retour au salon
      </button>
    </div>
  </div>

  <script>
    var currentGame = null;

    // État de la séquence en cours
    var selected = null;          // position de départ originale [x, y]
    var positionCourante = null;  // position visuelle actuelle du pion en mouvement
    var coupsFiltres = [];        // coups encore possibles dans la séquence
    var prisesFaites = [];        // pièces déjà capturées dans la séquence
    var etape = 0;                // index de l'étape courante dans chemin[]

    const user = JSON.parse(sessionStorage.getItem("user"));

    if (!user) {
      window.location.href = "/";
    }

    const socket = new WebSocket("ws://localhost:3000");

    socket.onopen = () => {
      console.log("partie socket connected");

      socket.send(JSON.stringify({
        type: "login",
        data: { userId: user.id, username: user.username }
      }));

      socket.send(JSON.stringify({ type: "getGameState" }));
    };

    socket.onmessage = (event) => {
      const msg = JSON.parse(event.data);
      console.log("Message reçu :", msg);

      if (msg.type === "error") {
        showError(msg.data);
        reinitialiserSelection();
        return;
      }

      if (msg.type === "gameState") {
        currentGame = msg.data;
        reinitialiserSelection();

        const maCouleur = currentGame.joueurs.blanc === user.id ? "blanc" : "noir";

        document.getElementById("playerInfo").innerText =
          "Vous jouez : " + user.username + " — " + maCouleur;
        document.getElementById("turn").innerText =
          "Tour : " + currentGame.tour;

        renderBoard(currentGame.plateau);

        if (currentGame.gagnant) {
          const myColorKey = user.id === currentGame.joueurs.blanc ? "blanc" : "noir";
          const estGagnant = currentGame.gagnant === myColorKey;
          let texte = "";
          if (estGagnant) {
            if (currentGame.raison === "abandon") texte = "Votre adversaire a abandonné. Vous avez gagné !";
            else if (currentGame.raison === "deconnexion") texte = "Votre adversaire s'est déconnecté. Vous avez gagné !";
            else texte = "Vous avez gagné !";
          } else {
            if (currentGame.raison === "abandon") texte = "Vous avez abandonné la partie.";
            else texte = "Vous avez perdu...";
          }
          document.getElementById("gameOverMsg").innerText = texte;
          document.getElementById("gameOver").style.display = "flex";
        }
      }
    };

    function reinitialiserSelection() {
      selected = null;
      positionCourante = null;
      coupsFiltres = [];
      prisesFaites = [];
      etape = 0;
    }

    function clickCell(x, y) {
      if (!currentGame) return;

      const maCouleur = currentGame.joueurs.blanc === user.id ? "blanc" : "noir";
      if (currentGame.tour !== maCouleur) return;

      // Aucune pièce sélectionnée : sélectionner
      if (!selected) {
        const coups = (currentGame.coupsDisponibles || []).filter(
          c => c.de[0] === x && c.de[1] === y
        );
        if (coups.length === 0) return;

        selected = [x, y];
        positionCourante = [x, y];
        coupsFiltres = coups;
        prisesFaites = [];
        etape = 0;
        renderBoard(plateauVirtuel());
        return;
      }

      // Calculer les prochaines cases valides à cette étape
      const prochaines = new Set();
      const finales = new Set();
      for (const c of coupsFiltres) {
        if (c.chemin.length > etape) {
          prochaines.add(c.chemin[etape][0] + "," + c.chemin[etape][1]);
        } else {
          finales.add(c.vers[0] + "," + c.vers[1]);
        }
      }

      const cle = x + "," + y;

      if (finales.has(cle)) {
        // Case finale : envoyer le coup complet au serveur
        socket.send(JSON.stringify({
          type: "move",
          data: { gameId: currentGame.id, from: selected, to: [x, y] }
        }));
        reinitialiserSelection();

      } else if (prochaines.has(cle)) {
        // Étape intermédiaire : avancer la séquence visuellement
        const nouveauxFiltres = coupsFiltres.filter(
          c => c.chemin.length > etape &&
               c.chemin[etape][0] === x && c.chemin[etape][1] === y
        );
        // La prise effectuée à cette étape
        prisesFaites.push(nouveauxFiltres[0].prises[etape]);
        positionCourante = [x, y];
        coupsFiltres = nouveauxFiltres;
        etape++;
        renderBoard(plateauVirtuel());

      } else {
        // Clic invalide : désélectionner et essayer de sélectionner la nouvelle case
        reinitialiserSelection();
        renderBoard(currentGame.plateau);
        clickCell(x, y);
      }
    }

    // Génère un plateau virtuel reflétant les étapes intermédiaires déjà effectuées
    function plateauVirtuel() {
      if (!selected || !positionCourante) return currentGame.plateau;

      const vp = currentGame.plateau.map(ligne => [...ligne]);
      const piece = vp[selected[0]][selected[1]];
      vp[selected[0]][selected[1]] = null;
      vp[positionCourante[0]][positionCourante[1]] = piece;
      for (const [px, py] of prisesFaites) {
        vp[px][py] = null;
      }
      return vp;
    }

    function renderBoard(board) {
      const div = document.getElementById("board");
      div.innerHTML = "";
      div.style.display = "grid";
      div.style.gridTemplateColumns = "repeat(10, 40px)";

      const maCouleur = currentGame.joueurs.blanc === user.id ? "blanc" : "noir";
      const monTour = currentGame.tour === maCouleur;

      // Pièces adverses capturables (vert) — uniquement hors séquence
      const aCapture = new Set();
      if (monTour && !selected) {
        (currentGame.coupsDisponibles || [])
          .filter(c => c.prises && c.prises.length > 0)
          .forEach(c => aCapture.add(c.prises[0][0] + "," + c.prises[0][1]));
      }

      // Prochaines cases valides (bleu) — selon l'étape courante
      const aDestination = new Set();
      if (selected) {
        for (const c of coupsFiltres) {
          if (c.chemin.length > etape) {
            aDestination.add(c.chemin[etape][0] + "," + c.chemin[etape][1]);
          } else {
            aDestination.add(c.vers[0] + "," + c.vers[1]);
          }
        }
      }

      for (let i = 0; i < 10; i++) {
        for (let j = 0; j < 10; j++) {
          const cell = document.createElement("div");
          cell.style.width = "40px";
          cell.style.height = "40px";
          cell.style.border = "1px solid black";

          cell.style.backgroundColor = (i + j) % 2 === 0 ? "#eee" : "#666";

          if (aCapture.has(i + "," + j)) cell.style.backgroundColor = "#4caf50";
          if (aDestination.has(i + "," + j)) cell.style.backgroundColor = "#2196f3";
          if (positionCourante && positionCourante[0] === i && positionCourante[1] === j) {
            cell.style.backgroundColor = "yellow";
          }

          if (board[i][j]) {
            const piece = board[i][j];
            cell.innerText = piece.startsWith("blanc")
              ? (piece.includes("dame") ? "♔" : "●")
              : (piece.includes("dame") ? "♚" : "●");
            cell.style.color = piece.startsWith("blanc") ? "white" : "black";
            cell.style.textAlign = "center";
            cell.style.lineHeight = "40px";
          }

          cell.onclick = () => clickCell(i, j);
          div.appendChild(cell);
        }
      }
    }

    function abandonGame() {
      if (!currentGame) return;
      if (!confirm("Voulez-vous vraiment abandonner la partie ?")) return;
      socket.send(JSON.stringify({
        type: "abandon",
        data: { gameId: currentGame.id }
      }));
    }

    function showError(msg) {
      const box = document.getElementById("errorBox");
      box.innerText = msg;
      setTimeout(() => { box.innerText = ""; }, 2000);
    }
  </script>

</body>

</html>
