<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Partie</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body style="flex-direction: column; height:auto; padding-top:40px;">

  <h2>Jeu de dames</h2>

  <div class="container" style="width:400px;">
    <h3 id="playerInfo"></h3>
    <h3 id="turn"></h3>
  </div>

  <div id="board" style="margin-top:30px;"></div>

  <div id="gameOver" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%;
       background:rgba(0,0,0,0.6); z-index:100; flex-direction:column;
       align-items:center; justify-content:center;">
    <div style="background:white; padding:40px; border-radius:12px; text-align:center;">
      <h2 id="gameOverMsg" style="margin-bottom:20px;"></h2>
      <button onclick="window.location.href='/salon.html'"
              style="padding:10px 24px; font-size:16px; cursor:pointer;">
        Retour au salon
      </button>
    </div>
  </div>

  <script>
    var currentGame = null;
    var selected = null;

    const user = JSON.parse(sessionStorage.getItem("user"));

    if (!user) {
      window.location.href = "/";
    }

    const socket = new WebSocket("ws://localhost:3000");

    socket.onopen = () => {
      console.log("partie socket connected");

      socket.send(JSON.stringify({
        type: "login",
        data: {
          userId: user.id,
          username: user.username
        }
      }));

      socket.send(JSON.stringify({
        type: "getGameState"
      }));
    };

    socket.onmessage = (event) => {
      const msg = JSON.parse(event.data);
      console.log("Message reçu :", msg);

      if (msg.type === "gameState") {
        currentGame = msg.data;

        let myColor = "";

        if (user.id === currentGame.joueurs.blanc) {
          myColor = "blanc";
        } else if (user.id === currentGame.joueurs.noir) {
          myColor = "noir";
        }

        document.getElementById("playerInfo").innerText =
          "Vous jouez : " + user.username + " — " + myColor;

        document.getElementById("turn").innerText =
          "Tour : " + currentGame.tour;

        renderBoard(currentGame.plateau);

        if (currentGame.gagnant) {
          const myColorKey = user.id === currentGame.joueurs.blanc ? "blanc" : "noir";
          const isWinner = currentGame.gagnant === myColorKey;
          document.getElementById("gameOverMsg").innerText = isWinner ? "Vous avez gagné !" : "Vous avez perdu...";
          document.getElementById("gameOver").style.display = "flex";
        }
      }
    };

    function clickCell(x, y) {
      if (!selected) {
        selected = [x, y];
        renderBoard(currentGame.plateau);
      } else {
        socket.send(JSON.stringify({
          type: "move",
          data: {
            gameId: currentGame.id,
            from: selected,
            to: [x, y]
          }
        }));
        selected = null;
      }
    }

    function renderBoard(board) {
      const div = document.getElementById("board");

      div.innerHTML = "";
      div.style.display = "grid";
      div.style.gridTemplateColumns = "repeat(10, 40px)";

      for (let i = 0; i < 10; i++) {
        for (let j = 0; j < 10; j++) {

          const cell = document.createElement("div");

          cell.style.width = "40px";
          cell.style.height = "40px";
          cell.style.border = "1px solid black";

          // couleur de la case
          if ((i + j) % 2 === 0) {
            cell.style.backgroundColor = "#eee";
          } else {
            cell.style.backgroundColor = "#666";
          }

          // surbrillance sélection
          if (selected && selected[0] === i && selected[1] === j) {
            cell.style.backgroundColor = "yellow";
          }

          // pion
          if (board[i][j]) {
            const piece = board[i][j];

            if (piece.startsWith("blanc")) {
              cell.innerText = piece.includes("dame") ? "♔" : "●";
              cell.style.color = "white";
            } else {
              cell.innerText = piece.includes("dame") ? "♚" : "●";
              cell.style.color = "black";
            }

            cell.style.textAlign = "center";
            cell.style.lineHeight = "40px";
          }

          cell.onclick = () => clickCell(i, j);

          div.appendChild(cell);
        }
      }
    }
  </script>

</body>

</html>
